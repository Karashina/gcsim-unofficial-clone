<!DOCTYPE html>
<html>
<head>
    <title>gcsim Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 5px 10px 0; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f5f5f5; white-space: pre-wrap; font-family: monospace; font-size: 11px; max-height: 500px; overflow: auto; }
        .error { background: #ffebee; border-color: #f44336; }
        .success { background: #e8f5e9; border-color: #4caf50; }
        .info { background: #e3f2fd; border-color: #2196f3; }
        .buttons { display: flex; gap: 10px; }
        #console { margin-top: 20px; padding: 15px; border: 1px solid #666; background: #1e1e1e; color: #d4d4d4; font-family: monospace; font-size: 11px; max-height: 300px; overflow: auto; }
        .log { margin: 2px 0; }
        .log-info { color: #4fc3f7; }
        .log-error { color: #f44336; }
        .log-success { color: #66bb6a; }
    </style>
    <script src="app.js"></script>
</head>
<body>
    <h1>🔬 gcsim Simulation Debug Test</h1>
    
    <h3>Test Configuration:</h3>
    <textarea id="config">target lvl=100 pyro=0.1;

bennett char lvl=90/90 cons=0 talent=6,6,6;
bennett add weapon="prototypestarglitter" lvl=90/90 refine=1;

active bennett;
bennett attack;</textarea>
    <br>
    
    <div class="buttons">
        <button onclick="testAPI()">Test API (text/plain)</button>
        <button onclick="testAPIJSON()">Test API (application/json)</button>
        <button onclick="testMainUI()">Test Main UI Function</button>
        <button onclick="testRunSimulation()">Test window.runSimulation()</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="result"></div>
    <div id="console"></div>

    <script>
        function log(message, type = 'info') {
            const consoleDiv = document.getElementById('console');
            const logDiv = document.createElement('div');
            logDiv.className = `log log-${type}`;
            logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleDiv.appendChild(logDiv);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(message);
        }

        function clearLogs() {
            document.getElementById('console').innerHTML = '';
            document.getElementById('result').textContent = '';
            log('Logs cleared', 'info');
        }

        async function testAPI() {
            const config = document.getElementById('config').value;
            const resultDiv = document.getElementById('result');
            
            log('Testing API with text/plain...', 'info');
            resultDiv.textContent = 'Testing API (text/plain)...';
            resultDiv.className = 'info';

            try {
                log('Sending POST to /api/simulate', 'info');
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: config
                });

                log(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                const data = await response.json();
                
                if (!response.ok) {
                    resultDiv.className = 'error';
                    resultDiv.textContent = 'Error:\n' + JSON.stringify(data, null, 2);
                    log('API Error: ' + data.error, 'error');
                } else {
                    resultDiv.className = 'success';
                    log('API Success! Job ID: ' + data.job_id, 'success');
                    
                    // Fetch result
                    if (data.job_id) {
                        log('Fetching result for job: ' + data.job_id, 'info');
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        const resultResp = await fetch(`/api/result?id=${data.job_id}`);
                        const resultData = await resultResp.json();
                        log('Job status: ' + resultData.status, 'success');
                        resultDiv.textContent = 'Success!\n\n' + JSON.stringify(resultData, null, 2);
                    }
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Exception: ' + err.message;
                log('Exception: ' + err.message, 'error');
            }
        }

        async function testAPIJSON() {
            const config = document.getElementById('config').value;
            const resultDiv = document.getElementById('result');
            
            log('Testing API with application/json...', 'info');
            resultDiv.textContent = 'Testing API (application/json)...';
            resultDiv.className = 'info';

            try {
                log('Sending POST to /api/simulate', 'info');
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ config: config })
                });

                log(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                const data = await response.json();
                
                if (!response.ok) {
                    resultDiv.className = 'error';
                    resultDiv.textContent = 'Error:\n' + JSON.stringify(data, null, 2);
                    log('API Error: ' + data.error, 'error');
                } else {
                    resultDiv.className = 'success';
                    log('API Success! Job ID: ' + data.job_id, 'success');
                    resultDiv.textContent = 'Success!\n\nJob ID: ' + data.job_id + '\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Exception: ' + err.message;
                log('Exception: ' + err.message, 'error');
            }
        }

        function testMainUI() {
            log('Checking if window.runSimulation exists...', 'info');
            if (typeof window.runSimulation === 'function') {
                log('✓ window.runSimulation is defined', 'success');
                document.getElementById('result').className = 'success';
                document.getElementById('result').textContent = '✓ window.runSimulation exists!\n\nFunction definition:\n' + window.runSimulation.toString().substring(0, 500) + '...';
            } else {
                log('✗ window.runSimulation is NOT defined', 'error');
                document.getElementById('result').className = 'error';
                document.getElementById('result').textContent = '✗ window.runSimulation is NOT defined!\n\nThis means app.js is not loaded correctly.';
            }
        }

        async function testRunSimulation() {
            log('Attempting to call window.runSimulation()...', 'info');
            if (typeof window.runSimulation !== 'function') {
                log('✗ window.runSimulation is NOT defined', 'error');
                document.getElementById('result').className = 'error';
                document.getElementById('result').textContent = '✗ Cannot call window.runSimulation - function not found!';
                return;
            }

            try {
                log('Calling window.runSimulation()...', 'info');
                await window.runSimulation();
                log('✓ window.runSimulation() completed', 'success');
                document.getElementById('result').className = 'success';
                document.getElementById('result').textContent = '✓ window.runSimulation() executed!\n\nCheck the main UI for results.';
            } catch (err) {
                log('✗ Error calling window.runSimulation(): ' + err.message, 'error');
                document.getElementById('result').className = 'error';
                document.getElementById('result').textContent = '✗ Error: ' + err.message + '\n\n' + err.stack;
            }
        }

        // Log when page loads
        window.addEventListener('load', () => {
            log('Page loaded', 'success');
            log('Checking window.runSimulation: ' + (typeof window.runSimulation), 'info');
        });
    </script>
</body>
</html>
