<!-- Results Screen HTML Structure -->
<div class="screen" id="screen-results">
    <div class="results-container" id="results-container">
        <h5 style="margin: 15px 0 10px 0; font-size: 1.1rem;">📊 シミュレーション結果</h5>
        
        <!-- Target info panel removed to avoid auto-inserted content -->
        
        <div class="characters-section">
            <h6>キャラクター情報</h6>
            <div id="characters-list"></div>
        </div>
        
        <div class="stats-summary-section">
            <h6>統計情報</h6>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">DPS</div><div class="stat-value" id="stat-dps">-</div></div>
                <div class="stat-card"><div class="stat-label">EPS</div><div class="stat-value" id="stat-eps">-</div></div>
                <div class="stat-card"><div class="stat-label">RPS</div><div class="stat-value" id="stat-rps">-</div></div>
                <div class="stat-card"><div class="stat-label">HPS</div><div class="stat-value" id="stat-hps">-</div></div>
                <div class="stat-card"><div class="stat-label">SHP</div><div class="stat-value" id="stat-shp">-</div></div>
                <div class="stat-card"><div class="stat-label">時間</div><div class="stat-value" id="stat-dur">-</div></div>
            </div>
        </div>
        
        <div class="charts-section">
            <h6>キャラクター別DPS・ソース別DPS</h6>
            <div class="charts-grid">
                <div class="chart-container" id="char-dps-chart-container">
                    <div class="chart-title">キャラクター別DPS</div>
                    <canvas id="char-dps-chart"></canvas>
                </div>
                <div class="chart-container" id="source-dps-chart-container">
                    <div class="chart-title">ソース別DPS</div>
                    <canvas id="source-dps-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
